type: charm
name: forgejo-runner-k8s
title: Forgejo Runner K8s Operator
summary: Charmed Kubernetes operator for Forgejo Runner.
description: |
  Deploy and configure a runner of the software forge, Forgejo.

base: ubuntu@22.04
platforms:
  amd64:
  arm64:

# requires:
