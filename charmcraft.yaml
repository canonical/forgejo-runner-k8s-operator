containers:
  forgejo:
    resource: forgejo-runner-image
    mounts:
      - storage: data
        location: /data

storage:
  data:
    type: filesystem

resources:
  forgejo-runner-image:
    type: oci-image
    description: OCI image for the Forgejo Runner container
    upstream-source: code.forgejo.org/forgejo/runner:9

parts:
  charm:
    plugin: charm
    source: .

config:
  options:
    log-level:
      description: |
        Configures the log level of Forgejo Runner.

        Acceptable values are one of trace, debug, info, warn, error, or fatal.
      default: "info"
      type: string
    job-log-level:
      description: |
        Configures the log level of Forgejo Runner jobs.

        Acceptable values are one of trace, debug, info, warn, error, or fatal.
      default: "info"
      type: string
    registration-token:
      description: |
        Forgejo token to register the runner (Will be removed soon).
      type: string
    labels:
      description: |
        Comma separated strings to define label(s) of the runner.   
      default: "docker"      
      type: string
    forgejo-url:
      description: |
        URL of the Forgejo server (Future charm relation will overwrite this).         
      type: string


assumes:
  - juju >= 3.5
  - k8s-api
